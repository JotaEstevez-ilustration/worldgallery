<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Page not found — Redirecting</title>
  <!-- Immediate meta refresh fallback for non-JS clients -->
  <meta http-equiv="refresh" content="0; url=/index.html#top">
  <style>
    :root{--bg:#f7f7fa;--fg:#222;--muted:#555}
    html,body{height:100%}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans",sans-serif;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--fg)}
    .card{text-align:center;padding:28px;border-radius:10px;background:#fff;box-shadow:0 6px 20px rgba(20,30,50,0.08);max-width:520px;margin:20px}
    h1{font-size:28px;margin:0 0 8px}
    p{margin:0 0 16px;color:var(--muted)}
    a.button{display:inline-block;padding:10px 16px;border-radius:8px;background:#111;color:#fff;text-decoration:none;font-weight:600}
    a.link{color:#0b66f6}
  </style>
  <script>
    // JavaScript redirect (preferred) — replace so browser history doesn't keep the 404 URL
    (function(){
      try{
        var target = '/index.html#top';
        // small delay to allow screen readers to announce message before navigation
        setTimeout(function(){ window.location.replace(target); }, 100);
      }catch(e){/* ignore */}
    })();
  </script>
</head>
<body>
  <main class="card" role="main">
    <h1>Page not found</h1>
    <p>The requested URL was not found on this server. You will be redirected to the home page.</p>
    <p>If you are not redirected automatically, <a class="link" href="/index.html#top">click here to go to the home page</a>.</p>
    <p style="margin-top:14px"><a class="button" href="/index.html#top">Go to home</a></p>
  </main>
</body>
</html>
